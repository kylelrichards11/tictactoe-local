name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv venv && uv pip install -e ".[dev]"

      - name: Lint
        working-directory: backend
        run: .venv/bin/ruff check .

      - name: Test
        working-directory: backend
        run: .venv/bin/pytest --cov --cov-report=term-missing --cov-report=json

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install

      - name: Type check
        working-directory: frontend
        run: pnpm type-check

      - name: Lint
        working-directory: frontend
        run: pnpm lint

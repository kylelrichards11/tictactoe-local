name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv venv && uv pip install -e ".[dev]"

      - name: Test with coverage
        working-directory: backend
        run: .venv/bin/pytest --cov --cov-branch --cov-context=test --cov-report=term-missing --cov-report=json:../coverage.json --junit-xml=../junit.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            coverage.json
            junit.xml
          if-no-files-found: error
